services:
  wakeword:
    build:
      context: ./wakeword
      dockerfile: Dockerfile
    container_name: voice_wakeword
    environment:
      - WAKEWORD_MODEL_PATH=${WAKEWORD_MODEL_PATH:-/models/wakeword/model.onnx}
      - WAKEWORD_THRESHOLD=${WAKEWORD_THRESHOLD:-0.3}
      - WAKEWORD_FRAMEWORK=${WAKEWORD_FRAMEWORK:-onnx}
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - voice_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  stt:
    build:
      context: ./stt
      dockerfile: Dockerfile
    container_name: voice_stt
    environment:
      - WHISPER_MODEL_PATH=${WHISPER_MODEL_PATH:-/models/whisper/}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - voice_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: voice_llm
    runtime: nvidia
    environment:
      - LLM_MODEL_PATH=${LLM_MODEL_PATH:-/models/llm/model.gguf}
      - LLM_SYSTEM_PROMPT=${LLM_SYSTEM_PROMPT:-You are a helpful AI voice assistant. Be concise and clear.}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.8}
      - LLM_TOP_P=${LLM_TOP_P:-0.95}
      - LLM_N_CTX=${LLM_N_CTX:-4096}
      - LLM_N_THREADS=${LLM_N_THREADS:-6}
      - AGENT_ENABLED=${AGENT_ENABLED:-false}
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "8003:8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - voice_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: voice_tts
    environment:
      - TTS_MODEL_PATH=${TTS_MODEL_PATH:-/models/tts}
      - TTS_VOICE=${TTS_VOICE:-en_US-lessac-medium}
      - TTS_SPEAKER_ID=${TTS_SPEAKER_ID:-0}
      - TTS_NOISE_SCALE=${TTS_NOISE_SCALE:-0.667}
      - TTS_LENGTH_SCALE=${TTS_LENGTH_SCALE:-1.0}
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "8004:8004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - voice_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: voice_orchestrator
    environment:
      - WAKEWORD_SERVICE_URL=${WAKEWORD_SERVICE_URL:-http://wakeword:8001}
      - STT_SERVICE_URL=${STT_SERVICE_URL:-http://stt:8002}
      - LLM_SERVICE_URL=${LLM_SERVICE_URL:-http://llm:8003}
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts:8004}
      - AUDIO_INPUT_DEVICE=${AUDIO_INPUT_DEVICE:--1}
      - AUDIO_OUTPUT_DEVICE=${AUDIO_OUTPUT_DEVICE:--1}
      - AUDIO_SAMPLE_RATE=${AUDIO_SAMPLE_RATE:-16000}
      - AUDIO_CHANNELS=${AUDIO_CHANNELS:-1}
      - AUDIO_CHUNK_SIZE=${AUDIO_CHUNK_SIZE:-1280}
      - AUDIO_VOLUME=${AUDIO_VOLUME:-1.0}
      - SILENCE_DURATION=${SILENCE_DURATION:-1.5}
      - MAX_RECORD_SECONDS=${MAX_RECORD_SECONDS:-15.0}
      - SILENCE_THRESHOLD=${SILENCE_THRESHOLD:-0.005}
      - CHAT_CONTINUATION_ENABLED=${CHAT_CONTINUATION_ENABLED:-true}
      - CHAT_CONTINUATION_TIMEOUT=${CHAT_CONTINUATION_TIMEOUT:-5.0}
      - AGENT_ENABLED=${AGENT_ENABLED:-false}
      - CONFIRMATION_PHRASES=${CONFIRMATION_PHRASES:-mhm,listening,go ahead}
    volumes:
      - confirmations:/app/assets/confirmations
      - /run/asound:/run/asound:rw
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    privileged: false
    depends_on:
      wakeword:
        condition: service_healthy
      stt:
        condition: service_healthy
      llm:
        condition: service_healthy
      tts:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voice_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  voice_net:
    driver: bridge

volumes:
  confirmations:
