name: Build ARM64 image for Jetson

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64:
    name: Build ARM64 image and upload artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to NVIDIA NGC (nvcr.io)
        uses: docker/login-action@v2
        with:
          registry: nvcr.io
          username: ${{ secrets.NVCR_USERNAME }}
          password: ${{ secrets.NVCR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create builder
        run: docker buildx create --use --bootstrap

      - name: Build arm64 image and export tar
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f docker/llm/Dockerfile.cuda \
            -t ai-voice-stack/llm:arm64 \
            --output type=tar,dest=llm-arm64.tar \
            docker/llm

      - name: Upload image tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-arm64-image
          path: llm-arm64.tar

      - name: push to dockerhub
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker buildx build \
            --platform linux/arm64 \
            -f docker/llm/Dockerfile.cuda \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-voice-stack-llm:arm64 \
            --push \
            docker/llm
