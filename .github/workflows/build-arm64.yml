name: Build ARM64 image for Jetson

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64:
    name: Build ARM64 image and upload artifact
    runs-on: ubuntu-24.04-arm          # native arm64, no QEMU
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to NVIDIA NGC (nvcr.io)
        uses: docker/login-action@v3
        with:
          registry: nvcr.io
          username: ${{ secrets.NVCR_USERNAME }}
          password: ${{ secrets.NVCR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build arm64 image -> loadable tar
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f docker/llm/Dockerfile.cuda \
            -t ai-voice-stack/llm:arm64 \
            --output type=docker,dest=llm-arm64.tar \
            docker/llm

      - name: Upload image tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-arm64-image
          path: llm-arm64.tar

      - name: Push to Docker Hub (if creds present)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker load -i llm-arm64.tar
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker tag ai-voice-stack/llm:arm64 "$DOCKERHUB_USERNAME/ai-voice-stack-llm:arm64"
          docker push "$DOCKERHUB_USERNAME/ai-voice-stack-llm:arm64"
