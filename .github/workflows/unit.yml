name: unit

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false # never pull the repo's LFS models (bandwidth quota)

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # numpy 1.26.x (pinned for <3.14) ships cp312 wheels, so syncing needs no C build.
          python-version: "3.12"

      - name: Install task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: System libraries
        # sounddevice (imported by the client modules) needs PortAudio present to import,
        # even though no device is ever opened in the tests.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2

      - name: Install dependencies (base + dev group)
        run: uv sync --inexact

      - name: Run unit tests
        run: task test
